steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/flask-api:$SHORT_SHA'
      - '.'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/flask-api:$SHORT_SHA'

images:
  - 'gcr.io/$PROJECT_ID/flask-api:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'
